[node]
working_dir = "/app/stacks-blockchain/data"
rpc_bind = "0.0.0.0:APP_STACKS_CORE_RPC_PORT"
p2p_bind = "0.0.0.0:APP_STACKS_CORE_P2P_PORT"
bootstrap_node = "02da7a464ac173a506b9afe445236c2c311f46e0f7a5e6a5e5e0b8a1f81e8bb39c@seed-0.mainnet.stacks.co:20444,02afeae522aab5f8c99a00ddf75fbcb4a641e052dd48836408d9cf437344b63516@seed-1.mainnet.stacks.co:20444,03652212ea76be0ed4cd83a25c06e57819993029a7b9999f7d63c36340b34a4e62@seed-2.mainnet.stacks.co:20444"
prometheus_bind = "0.0.0.0:9153"

[burnchain]
chain = "bitcoin"
mode = "mainnet"
peer_host = "APP_BITCOIN_NODE_IP"
username = "APP_BITCOIN_RPC_USER"
password = "APP_BITCOIN_RPC_PASS"
rpc_port = APP_BITCOIN_RPC_PORT
